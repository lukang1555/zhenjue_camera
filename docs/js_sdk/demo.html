<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crane WebSocket SDK 一键联调</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
      margin-bottom: 16px;
    }
    .row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      background: #fff;
    }
    textarea { min-height: 120px; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
    }
    button.secondary { background: #4b5563; }
    .log {
      white-space: pre-wrap;
      background: #0b1020;
      color: #d1e7ff;
      border-radius: 8px;
      padding: 12px;
      height: 320px;
      font-family: Consolas, monospace;
      font-size: 12px;
      overflow: auto;
    }
    .log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .log-head h3 {
      margin: 0;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      color: #374151;
      font-size: 13px;
    }
    .filter-row label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .filter-row input[type="checkbox"] {
      width: auto;
    }
    button.ghost {
      background: #6b7280;
      color: #fff;
    }
    .tip { color: #6b7280; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Crane WebSocket SDK 最小联调页</h2>
      <p class="tip">先填服务地址后点击“一键联调”。默认会：连接 -> 发送 ARM_STATUS_QUERY -> 等待 ACK。</p>
      <div class="row">
        <label for="url">WebSocket URL</label>
        <input id="url" value="ws://127.0.0.1:8080/ws" />
      </div>
      <div class="row">
        <label for="identity">Identity</label>
        <input id="identity" value="PAD-DEVICE-0001" />
      </div>
      <div class="row">
        <label for="api">API</label>
        <input id="api" value="ARM_STATUS_QUERY" />
      </div>
      <div class="row">
        <label for="body">Body(JSON)</label>
        <textarea id="body">{
  "robot_id": "RB001"
}</textarea>
      </div>
      <div class="actions">
        <button id="btnRun">一键联调</button>
        <button id="btnDisconnect" class="secondary">断开连接</button>
      </div>
    </div>

    <div class="card">
      <div class="log-head">
        <h3>实时日志</h3>
        <button id="btnClearLog" class="ghost">清理日志</button>
      </div>
      <div class="filter-row">
        <span>类型筛选:</span>
        <label><input type="checkbox" id="filterSystem" checked /> system</label>
        <label><input type="checkbox" id="filterPayload" checked /> payload</label>
        <label><input type="checkbox" id="filterAck" checked /> ack</label>
        <label><input type="checkbox" id="filterError" checked /> error</label>
        <label><input type="checkbox" id="filterPing" /> ping</label>
        <label><input type="checkbox" id="filterPong" /> pong</label>
      </div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <script src="./index.js"></script>
  <script>
    var sdk = null;
    var logEl = document.getElementById("log");
    var MAX_LOG_LINES = 500;
    var logLines = [];

    function logTypeEnabled(type) {
      var map = {
        system: document.getElementById("filterSystem").checked,
        payload: document.getElementById("filterPayload").checked,
        ack: document.getElementById("filterAck").checked,
        error: document.getElementById("filterError").checked,
        ping: document.getElementById("filterPing").checked,
        pong: document.getElementById("filterPong").checked,
      };

      return map[type] !== false;
    }

    function addLog(type, msg, data) {
      if (!logTypeEnabled(type)) return;

      var line = "[" + new Date().toISOString() + "] [" + type + "] " + msg;
      if (typeof data !== "undefined") {
        line += "\n" + JSON.stringify(data, null, 2);
      }

      logLines.push(line);
      if (logLines.length > MAX_LOG_LINES) {
        logLines = logLines.slice(logLines.length - MAX_LOG_LINES);
      }

      logEl.textContent = logLines.join("\n\n") + "\n\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    function getBody() {
      var raw = document.getElementById("body").value;
      return JSON.parse(raw);
    }

    document.getElementById("btnRun").addEventListener("click", function () {
      try {
        var url = document.getElementById("url").value.trim();
        var identity = document.getElementById("identity").value.trim();
        var api = document.getElementById("api").value.trim();
        var body = getBody();

        if (sdk) {
          sdk.disconnect(1000, "restart_debug");
          sdk = null;
        }

        sdk = new window.CraneWebSocketSDK.CraneWebSocketClient({
          url: url,
          identity: identity,
          pingIntervalMs: 5000,
          pongTimeoutMs: 30000,
          ackTimeoutMs: 3000,
          autoReconnect: true,
          debug: true,
          onOpen: function () {
            addLog("system", "socket open");
            sdk.sendpayload(api, body)
              .then(function (ret) {
                addLog("ack", "sendpayload ack success", ret.ack);
              })
              .catch(function (err) {
                addLog("error", "sendpayload failed", err);
              });
          },
          onClose: function (evt) {
            addLog("system", "socket close", { code: evt.code, reason: evt.reason });
          },
          onError: function () {
            addLog("error", "socket error");
          },
          onAckTimeout: function (err) {
            addLog("error", "ack timeout", err);
          },
          onAckCodeError: function (err) {
            addLog("error", "ack code non-zero", err);
          },
          onPayload: function (msg) {
            addLog("payload", "incoming payload", msg);
          },
          onAck: function (msg) {
            addLog("ack", "incoming ack", msg);
          },
          onPing: function (msg) {
            addLog("ping", "incoming ping", msg);
          },
          onPong: function (msg) {
            addLog("pong", "incoming pong", msg);
          },
          onProtocolError: function (err) {
            addLog("error", "protocol error", err);
          },
          onReconnectAttempt: function (info) {
            addLog("system", "reconnect attempt", info);
          },
        });

        sdk.onApi("ARM_STATUS_RSP", function (msg) {
          addLog("payload", "onApi ARM_STATUS_RSP", msg.body);
        });

        sdk.connect();
      } catch (err) {
        addLog("error", "run failed", { message: err.message });
      }
    });

    document.getElementById("btnDisconnect").addEventListener("click", function () {
      if (!sdk) return;
      sdk.disconnect(1000, "manual_stop");
      addLog("system", "manual disconnect");
    });

    document.getElementById("btnClearLog").addEventListener("click", function () {
      logLines = [];
      logEl.textContent = "";
      addLog("system", "log cleared");
    });
  </script>
</body>
</html>
